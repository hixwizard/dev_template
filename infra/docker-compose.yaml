volumes:
  pg_data:
  static:
  media:

services:
  frontend:
    container_name: frontend
    env_file: .env
    build: ../frontend

  backend:
    container_name: backend
    restart: unless-stopped
    depends_on:
      - db
    build: ../backend
    env_file: .env
    volumes:
      - static:/app/staticfiles
      - media:/app/media

  db:
    image: postgres:16-alpine
    container_name: db
    restart: unless-stopped
    env_file: .env
    volumes:
      - pg_data:/var/lib/postgresql/data

  nginx:
    container_name: nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    build: .
    env_file: .env
    ports:
      - 80:80
    volumes:
      - static:/staticfiles
      - media:/app/media
