services:
  frontend:
    build:
      context: frontend
      args:
        - VITE_API_URL=${VITE_API_URL}
#    pull_policy: build
    depends_on:
      - backend
    env_file: .env
    ports:
      - 80:80
    volumes:
      - static:/staticfiles
      - media:/app/media


  backend:
    restart: unless-stopped
    env_file: .env
    depends_on:
      - db
    build: backend
#    pull_policy: build
    volumes:
      - static:/app/staticfiles
      - media:/app/media

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:
  static:
  media:
